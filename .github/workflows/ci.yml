name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Merge queue support: without this trigger, queue-created merge groups never
  # get the required `ci` check and every queued merge fails. Inert until the
  # queue is enabled in repo settings.
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # 20 min: forks pool runs 167 test files across 4 workers (~5 min) plus
    # setup steps (npm ci, drizzle check, typecheck, lint) and the Next.js
    # build all fit comfortably with headroom.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      # Fails when src/db/schema.ts has changes not covered by drizzle/
      # (drizzle-kit generate diffs schema.ts against the latest drizzle/meta
      # snapshot — no DB connection needed — and writes files only on drift).
      # BLOCKING since the 0005 snapshot catch-up: an unapplied schema change
      # can no longer merge (the 2026-06-11 outage class is unmergeable).
      - name: Migration drift check (schema vs drizzle/)
        run: |
          npx drizzle-kit generate --name ci_drift_check
          drift="$(git status --porcelain -- drizzle/)"
          # ALWAYS restore drizzle/ before later steps: the vitest suites apply
          # ./drizzle via PGlite migrate() (tests/helpers-db.ts), so a generated
          # drift artifact left on disk would double-apply DDL and fail `npm test`.
          git checkout -- drizzle/
          git clean -fdq drizzle/
          if [ -n "$drift" ]; then
            echo "::error::src/db/schema.ts has changes not covered by checked-in drizzle/ migrations. Run 'npx drizzle-kit generate', review the SQL, and commit it (drizzle selects explicit column lists — an unapplied schema change breaks every query on the altered table; see the 2026-06-11 outage)."
            echo "$drift"
            exit 1
          fi
          echo "schema.ts and drizzle/ migrations agree"

      # Blocking at high: verified 2026-06-12 that the current tree exits 0
      # here (only 2 moderate findings, below the threshold).
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # Four shards: each shard runs ~42 of the 169 test files in a fresh Node.js
      # process. Root cause: each PGlite test file allocates a 670 MB WASM
      # ArrayBuffer; even after client.close() + worker termination, a residual
      # ~75 MB per file lingers in the process RSS until the OS reclaims the
      # pages. After ~83 files the accumulated residual pushes total RSS above
      # 6.3 GB, leaving < 670 MB free for the next WASM allocation →
      # ERR_WORKER_OUT_OF_MEMORY on the last file. Two shards (84 files each)
      # still hit this threshold. Four shards (~42 files each) keep the
      # per-shard residual under 3.2 GB, well within the 7 GB CI runner limit.
      - name: Test (shard 1/4)
        run: npm test -- --shard=1/4
      - name: Test (shard 2/4)
        run: npm test -- --shard=2/4
      - name: Test (shard 3/4)
        run: npm test -- --shard=3/4
      - name: Test (shard 4/4)
        run: npm test -- --shard=4/4

      - name: Build
        run: npm run build

name: Smoke

on:
  deployment_status:

jobs:
  smoke:
    if: github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        # Target the canonical production domain, not target_url. The
        # per-deployment URL (claude-payments-<hash>-<team>.vercel.app) is
        # behind Vercel deployment protection by default, so Playwright would
        # land on an SSO page instead of /login. smartremit.ai is the
        # unprotected public URL we actually want to verify.
        env:
          CI: 'true'
          BASE_URL: https://smartremit.ai
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          # The partner fixture is SELF-PROVISIONED by the spec via the admin
          # UI (post fresh-start); only its login password stays a secret.
          E2E_PARTNER_PASSWORD: ${{ secrets.E2E_PARTNER_PASSWORD }}
        run: npm run e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          retention-days: 7

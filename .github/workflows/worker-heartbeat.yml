# The durability GUARANTEE for the outbox worker (free-tier choice, locked):
# Vercel's plan only allows daily crons, so this 5-minute GitHub Actions
# schedule is the heartbeat that drains anything the best-effort after() poke
# missed (crashed function, lost poke, delayed retries). Overlap-safe: the
# worker claims rows with FOR UPDATE SKIP LOCKED.
name: worker-heartbeat
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions: {}

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      # -f makes a non-2xx response FAIL this run — GitHub only notifies the
      # repo owner on workflow-run failure, so without it a broken drain (and
      # therefore the outbox delivery guarantee) is silent. One retry absorbs
      # transient cold-start blips before alerting.
      - name: Drain the outbox
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS -f --max-time 90 \
            --retry 1 --retry-delay 10 --retry-all-errors \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://smartremit.ai/api/worker" \
            -o /dev/null -w "worker drain HTTP %{http_code}\n"
